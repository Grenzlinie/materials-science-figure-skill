name: nanobanana-image-generation
description: Generate or edit materials-science figures with Gemini-compatible image models using the official generateContent API shape, or render exact publication plots locally with Python.
required_binaries:
  - name: python3
    description: Required runtime for the canonical image CLI and the local plotting pipeline.
optional_binaries:
  - name: node
    description: Optional runtime for scripts/generate_image.js, which is a parity image CLI rather than the required baseline runtime.
required_env:
  - name: NANOBANANA_API_KEY
    description: Provider API key used for authenticated generateContent requests.
  - name: NANOBANANA_BASE_URL
    description: Explicit Gemini-compatible HTTPS base URL. Recommended official value is https://generativelanguage.googleapis.com.
optional_env:
  - name: NANOBANANA_MODEL
    description: Gemini image model name. Defaults to gemini-3.1-flash-image-preview.
  - name: NANOBANANA_TIMEOUT
    description: HTTP timeout in seconds for network requests.
  - name: NANOBANANA_API_KEY_FILE
    description: Path to a local file containing the provider API key instead of putting the key directly in an environment variable or CLI argument.
  - name: NANOBANANA_ALLOW_THIRD_PARTY
    description: Set to 1 only when intentionally sending API keys and user-provided files to a non-official Gemini-compatible provider.
primary_credential:
  env: NANOBANANA_API_KEY
  alternatives:
    - NANOBANANA_API_KEY_FILE
capability_notes:
  - Plot mode is local-only and does not require outbound network access or API credentials.
  - The skill only sends network requests when the generation CLIs are explicitly run.
  - build_materials_figure_prompt.py and --print-prompt are local-only and do not transmit prompts, files, or credentials.
  - scripts/generate_image.js is an optional alternate CLI; Python remains the required runtime baseline.
security_notes:
  - Prompts, API keys, and user-provided input images are sent only to the explicitly configured provider endpoint when image mode is used.
  - Third-party provider use is blocked unless the user passes --allow-third-party or sets NANOBANANA_ALLOW_THIRD_PARTY=1.
  - Prefer NANOBANANA_API_KEY_FILE over inline --api-key when avoiding shell-history leakage matters.
